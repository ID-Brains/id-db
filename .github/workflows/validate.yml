name: Validate Markdown Frontmatter

on:
  pull_request:
    branches:
      - main
    paths:
      - "docs/**/*.md"
      - "src/content/docs/**/*.md"
      - "src/plugins/validation.py"
      - ".github/workflows/validate.yml"

jobs:
  validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('src/plugins/requirements.txt') }}

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r src/plugins/requirements.txt

      - name: Collect markdown files changed in this PR
        id: files
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "md_files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"

          files="$(git diff --name-only --diff-filter=ACMRT "origin/${{ github.base_ref }}"...HEAD | grep -E '\.md$' || true)"

          if [ -z "$files" ]; then
            echo "md_files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "md_files<<EOF"
            printf '%s\n' "$files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run markdown frontmatter validation
        shell: bash
        run: |
          set -euo pipefail

          files="${{ steps.files.outputs.md_files }}"
          if [ -z "$files" ]; then
            echo "No markdown files changed in this PR."
            exit 0
          fi

          while IFS= read -r file; do
            python src/plugins/validation.py "$file"
          done <<< "$files"
